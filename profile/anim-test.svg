<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="animation test">
  <rect width="200" height="200" fill="#0a0e14"/>
  <rect x="70" y="70" width="60" height="60" rx="8" fill="#22d3ee">
    <animateTransform attributeName="transform" type="rotate"
      from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="100" cy="100" r="6" fill="#0a0e14">
    <animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
