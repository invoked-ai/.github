<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" role="img" aria-label="Invoked">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#060b13"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="300" fill="url(#bg)"/>

  <!-- Tendril strands — woven cyan curves converging toward the wordmark.
       Each strand subtly undulates (SMIL) so the banner is alive on GitHub. -->
  <g fill="none" stroke="url(#wire)" stroke-linecap="round">
    <path stroke-width="2" opacity="0.6">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="M0 80 C 220 80, 360 150, 560 148; M0 80 C 220 60, 360 150, 560 148; M0 80 C 220 80, 360 150, 560 148"/>
    </path>
    <path stroke-width="2.5" opacity="0.85">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M0 130 C 240 130, 380 150, 560 150; M0 130 C 240 145, 380 150, 560 150; M0 130 C 240 130, 380 150, 560 150"/>
    </path>
    <path stroke-width="2" opacity="0.6">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="M0 185 C 230 185, 370 152, 560 152; M0 185 C 230 200, 370 152, 560 152; M0 185 C 230 185, 370 152, 560 152"/>
    </path>
    <path stroke-width="2" opacity="0.6">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="M1280 80 C 1060 80, 920 150, 720 148; M1280 80 C 1060 60, 920 150, 720 148; M1280 80 C 1060 80, 920 150, 720 148"/>
    </path>
    <path stroke-width="2.5" opacity="0.85">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M1280 130 C 1040 130, 900 150, 720 150; M1280 130 C 1040 145, 900 150, 720 150; M1280 130 C 1040 130, 900 150, 720 150"/>
    </path>
    <path stroke-width="2" opacity="0.6">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="M1280 185 C 1050 185, 910 152, 720 152; M1280 185 C 1050 200, 910 152, 720 152; M1280 185 C 1050 185, 910 152, 720 152"/>
    </path>
  </g>

  <!-- Tapered-almond pulses traveling each strand toward the center.
       The almond is a lens (two mirrored quad curves, sharp points), oriented
       along travel via rotate="auto". keyPoints/keyTimes ease them in, brighten
       toward center, then fade as they converge into the glow. -->
  <defs>
    <!-- sleek tapered almond, ~22px long, pointing +x (travel direction) -->
    <g id="pulse">
      <path d="M-11 0 Q 0 -2.4 11 0 Q 0 2.4 -11 0 Z" fill="#67e8f9"/>
      <path d="M-7 0 Q 0 -1.3 7 0 Q 0 1.3 -7 0 Z" fill="#ffffff" opacity="0.9"/>
    </g>
  </defs>
  <g>
    <!-- left strands → center -->
    <use href="#pulse" opacity="0">
      <animateMotion dur="3.2s" repeatCount="indefinite" rotate="auto" path="M0 80 C 220 80, 360 150, 560 148"/>
      <animate attributeName="opacity" dur="3.2s" repeatCount="indefinite" values="0;0;0.9;1;0" keyTimes="0;0.1;0.6;0.9;1"/>
    </use>
    <use href="#pulse" opacity="0">
      <animateMotion dur="2.8s" begin="0.9s" repeatCount="indefinite" rotate="auto" path="M0 130 C 240 130, 380 150, 560 150"/>
      <animate attributeName="opacity" dur="2.8s" begin="0.9s" repeatCount="indefinite" values="0;0;0.9;1;0" keyTimes="0;0.1;0.6;0.9;1"/>
    </use>
    <use href="#pulse" opacity="0">
      <animateMotion dur="3.6s" begin="1.7s" repeatCount="indefinite" rotate="auto" path="M0 185 C 230 185, 370 152, 560 152"/>
      <animate attributeName="opacity" dur="3.6s" begin="1.7s" repeatCount="indefinite" values="0;0;0.9;1;0" keyTimes="0;0.1;0.6;0.9;1"/>
    </use>
    <!-- right strands → center (path runs from edge inward, so pulses travel toward center) -->
    <use href="#pulse" opacity="0">
      <animateMotion dur="3.2s" begin="0.4s" repeatCount="indefinite" rotate="auto" path="M1280 80 C 1060 80, 920 150, 720 148"/>
      <animate attributeName="opacity" dur="3.2s" begin="0.4s" repeatCount="indefinite" values="0;0;0.9;1;0" keyTimes="0;0.1;0.6;0.9;1"/>
    </use>
    <use href="#pulse" opacity="0">
      <animateMotion dur="2.8s" begin="1.3s" repeatCount="indefinite" rotate="auto" path="M1280 130 C 1040 130, 900 150, 720 150"/>
      <animate attributeName="opacity" dur="2.8s" begin="1.3s" repeatCount="indefinite" values="0;0;0.9;1;0" keyTimes="0;0.1;0.6;0.9;1"/>
    </use>
    <use href="#pulse" opacity="0">
      <animateMotion dur="3.6s" begin="2.1s" repeatCount="indefinite" rotate="auto" path="M1280 185 C 1050 185, 910 152, 720 152"/>
      <animate attributeName="opacity" dur="3.6s" begin="2.1s" repeatCount="indefinite" values="0;0;0.9;1;0" keyTimes="0;0.1;0.6;0.9;1"/>
    </use>
  </g>

  <!-- Central glow behind the wordmark, gently breathing -->
  <ellipse cx="640" cy="150" rx="230" ry="70" fill="url(#glow)">
    <animate attributeName="rx" dur="5s" repeatCount="indefinite" values="220;245;220"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" values="0.8;1;0.8"/>
  </ellipse>

  <!-- Real Invoked wordmark (vector letterforms — font-independent).
       Source viewBox 0 0 4774 1238; scaled to ~420px wide, centered. -->
  <g transform="translate(461, 110) scale(0.075)" fill="#ffffff">
    <g transform="translate(0,946) scale(1,-1)">
      <path transform="translate(0,0)" d="M221 427C221 473 185 511 138 513C185 515 221 552 221 598C221 646 183 684 135 684C88 684 50 646 50 598C50 552 86 515 131 513C86 511 50 473 50 427V85C50 39 88 0 135 0C183 0 221 39 221 85Z" />
      <path transform="translate(271,0)" d="M221 85C221 131 185 169 138 171C185 173 221 210 221 256V392L588 25C604 9 626 0 648 0C696 0 734 39 734 85V598C734 645 695 684 648 684C601 684 563 646 563 598V292L196 659C180 674 158 684 135 684C88 684 50 645 50 598V256C50 210 86 173 131 171C86 169 50 132 50 85C50 38 89 0 135 0C183 0 221 38 221 85Z" />
      <path transform="translate(1055,0)" d="M637 441C637 488 599 527 552 527C520 527 491 509 476 481L368 273L187 636C172 665 143 684 110 684C63 684 25 645 25 598C25 585 28 572 34 560L291 47C305 19 334 0 366 0C399 0 428 18 443 46L628 402C634 414 637 428 637 441ZM709 598C709 645 671 684 623 684C576 684 538 645 538 598C538 551 576 513 623 513C671 513 709 551 709 598Z" />
      <path transform="translate(1789,0)" d="M708 342C708 531 555 684 366 684C178 684 25 530 25 342C25 151 175 0 366 0C556 0 708 152 708 342ZM454 342C454 389 416 427 369 427C322 427 283 389 283 342C283 294 322 256 369 256C416 256 454 294 454 342ZM537 342C537 246 462 171 366 171C270 171 195 245 195 342C195 437 271 513 366 513C461 513 537 436 537 342Z" />
      <path transform="translate(2522,0)" d="M221 85C221 132 185 169 138 171C185 173 221 210 221 256V598C221 645 183 684 135 684C88 684 50 645 50 598V256C50 210 86 173 131 171C86 169 50 132 50 85C50 38 89 0 135 0C183 0 221 38 221 85ZM734 598C734 645 696 684 648 684C626 684 604 674 588 659L331 402C316 386 306 364 306 342C306 319 316 297 331 281L588 25C604 9 626 0 648 0C695 0 734 38 734 85C734 108 724 130 709 146L512 342L709 538C724 554 734 576 734 598Z" />
      <path transform="translate(3281,0)" d="M709 86C709 134 671 172 623 172C576 172 538 134 538 86C538 134 500 172 452 172H367C263 172 196 237 196 343C196 449 263 514 367 514H623C671 514 709 552 709 599C709 646 671 685 623 685H367C322 685 278 676 237 660C98 607 25 490 25 343C25 254 51 166 116 102C181 39 276 1 367 1H452C499 1 536 37 538 82C540 37 577 1 623 1C671 1 709 39 709 86ZM538 343C538 390 499 428 452 428H367C320 428 281 390 281 343C281 295 320 257 367 257H452C499 257 538 295 538 343Z" />
      <path transform="translate(4015,0)" d="M734 342C734 431 707 519 642 583C578 646 482 684 392 684H135C89 684 50 646 50 598V256C50 210 86 173 131 171C86 169 50 132 50 85C50 38 88 0 135 0C182 0 219 36 221 81C223 36 260 0 306 0H392C482 0 578 38 642 101C707 165 734 252 734 342ZM221 85C221 132 185 169 138 171C185 173 221 210 221 256V513H392C496 513 563 448 563 342C563 235 495 171 391 171H306C259 171 221 133 221 85Z" />
    </g>
  </g>

  <!-- Tagline -->
  <text x="640" y="205" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0.5" fill="#9fb3c8">Design, run, and test AI agents in one workspace</text>
</svg>
